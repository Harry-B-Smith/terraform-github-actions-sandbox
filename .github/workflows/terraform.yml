name: "Terraform Automation"

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  TF_VAR_billing_account_id: ${{ secrets.GCP_BILLING_ACCOUNT_ID }}
  TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}

jobs:
  terraform-plan:
    name: "1. Terraform Plan"
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.5.7

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/785454820173/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
        service_account: 'tf-bootstrap@dark-gateway-398321.iam.gserviceaccount.com'

    - name: Terraform Init
      run: terraform init

    - name: Terraform Plan
      run: terraform plan -input=false

  terraform-apply:
    name: "2. Terraform Apply"
    runs-on: ubuntu-latest
    needs: terraform-plan # Explicit dependency: Plan must succeed first
    environment: production # Triggers the manual approval pop-up in GitHub
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.5.7

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/785454820173/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
        service_account: 'tf-bootstrap@dark-gateway-398321.iam.gserviceaccount.com'

    - name: Terraform Init
      run: terraform init

    - name: Terraform Apply
      run: terraform apply -auto-approve -input=false
